services:
  dispatcher:
    build: .
    ports:
      - "9090:9090"
    volumes:
      - ./config:/app/config:ro
    environment:
      - DISPATCHER_PORT=9090
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  mock-engine-1:
    image: python:3.11-slim
    ports:
      - "8001:8001"
    volumes:
      - ./scripts:/app/scripts:ro
    working_dir: /app
    command: ["python", "scripts/mock_engine.py", "--port", "8001", "--engine", "ollama"]
    depends_on:
      - dispatcher

  mock-engine-2:
    image: python:3.11-slim
    ports:
      - "8002:8002"
    volumes:
      - ./scripts:/app/scripts:ro
    working_dir: /app
    command: ["python", "scripts/mock_engine.py", "--port", "8002", "--engine", "ollama"]
    depends_on:
      - dispatcher
