# 要求 Docker Compose >= v2.20（condition: service_healthy 支持）
services:
  dispatcher:
    build: .
    image: llm-dispatcher:local
    ports:
      - "9090:9090"
    volumes:
      - ./config:/app/config:ro
    environment:
      - DISPATCHER_PORT=9090
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9090/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  mock-engine-1:
    image: llm-dispatcher:local   # 复用 dispatcher 构建的镜像
    ports:
      - "8001:8001"
    command: ["python", "scripts/mock_engine.py", "--port", "8001", "--engine", "ollama"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  mock-engine-2:
    image: llm-dispatcher:local   # 复用 dispatcher 构建的镜像
    ports:
      - "8002:8002"
    command: ["python", "scripts/mock_engine.py", "--port", "8002", "--engine", "ollama"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # 自动注册 mock 引擎到 dispatcher
  init:
    image: llm-dispatcher:local   # 复用 dispatcher 构建的镜像
    command:
      - /bin/sh
      - -c
      - |
        echo "Waiting for dispatcher..."
        while ! python -c "import urllib.request; urllib.request.urlopen('http://dispatcher:9090/health')" 2>/dev/null; do
          sleep 2
        done
        echo "Registering mock-engine-1..."
        python -c "
        import urllib.request, json
        data = json.dumps({'instance_id':'mock-1','address':'http://mock-engine-1:8001','model':'test-model','engine_type':'ollama'})
        urllib.request.urlopen(urllib.request.Request('http://dispatcher:9090/admin/instances', data=data.encode(), headers={'Content-Type':'application/json'}))
        "
        echo "Registering mock-engine-2..."
        python -c "
        import urllib.request, json
        data = json.dumps({'instance_id':'mock-2','address':'http://mock-engine-2:8002','model':'test-model','engine_type':'ollama'})
        urllib.request.urlopen(urllib.request.Request('http://dispatcher:9090/admin/instances', data=data.encode(), headers={'Content-Type':'application/json'}))
        "
        echo "Init complete — dispatcher ready with 2 mock engines."
        echo ""
        echo "=== Smoke Test ==="
        echo "→ Sending inference request..."
        python -c "
        import json, urllib.request, sys
        data = json.dumps({'model':'test-model','messages':[{'role':'user','content':'smoke test'}]})
        req = urllib.request.Request('http://dispatcher:9090/v1/chat/completions', data=data.encode(), headers={'Content-Type':'application/json'})
        try:
            resp = urllib.request.urlopen(req, timeout=30)
            body = json.loads(resp.read())
            content = body['choices'][0]['message']['content']
            assert '8001' in content or '8002' in content, f'unexpected response: {content[:100]}'
            print(f'  \033[32mPASS\033[0m inference OK — routed to mock engine')
        except Exception as e:
            print(f'  \033[31mFAIL\033[0m {e}', file=sys.stderr)
            sys.exit(1)
        "
        echo ""
        echo "→ Checking admin status..."
        python -c "
        import json, urllib.request, sys
        resp = urllib.request.urlopen('http://dispatcher:9090/admin/status')
        body = json.loads(resp.read())
        assert body['instances']['total'] == 2, f'expected 2 instances, got {body[\"instances\"][\"total\"]}'
        assert body['instances']['healthy'] == 2, f'expected 2 healthy, got {body[\"instances\"][\"healthy\"]}'
        print(f'  \033[32mPASS\033[0m status OK — {body[\"instances\"][\"healthy\"]}/{body[\"instances\"][\"total\"]} healthy')
        "
        echo ""
        echo "=== Smoke Test Passed ==="
    depends_on:
      dispatcher:
        condition: service_healthy
      mock-engine-1:
        condition: service_healthy
      mock-engine-2:
        condition: service_healthy
    restart: "no"
